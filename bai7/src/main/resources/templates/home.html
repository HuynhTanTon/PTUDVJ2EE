<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #ff6f61, #ffc371);
            background-size: 400% 400%;
            animation: bgGradient 15s ease infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .course-card {
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">CourseReg</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/my-courses}">My Courses</a></li>
            </ul>
            <form class="d-flex" th:action="@{/search}" method="get">
                <input class="form-control me-2" type="search" name="keyword" placeholder="Search course">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mb-4">
    <h1 class="mb-3 text-white">All Courses</h1>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        <div class="col" th:each="course : ${coursePage.content}">
            <div class="card h-100 course-card shadow-sm">
                <img th:if="${course.image != null}"
                     th:src="${course.image}"
                     class="card-img-top" alt="Course image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.name}">Course Name</h5>
                    <p class="card-text">
                        Credits: <span th:text="${course.credits}">3</span><br>
                        Lecturer: <span th:text="${course.lecturer}">Lecturer</span>
                    </p>
                </div>
                <div class="card-footer d-flex justify-content-end align-items-center">
                    <form th:action="@{'/enroll/' + ${course.id}}" method="post" class="m-0">
                        <button type="submit" class="btn btn-sm btn-primary">Enroll</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" th:if="${coursePage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/home(page=${currentPage-1}, keyword=${keyword})}">Previous</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, coursePage.totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/home(page=${i}, keyword=${keyword})}"></a>
            </li>
            <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/home(page=${currentPage+1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<footer class="text-center mt-auto mb-3 text-light-50">
    <hr class="border-light">
    <p class="text-light">&copy; 2025 - Course Registration Application</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
