<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #ff6f61, #ffc371);
            background-size: 400% 400%;
            animation: bgGradient 15s ease infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .table-wrapper {
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">CourseReg</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/my-courses}">My Courses</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-4 table-wrapper">
    <h2 class="mb-3 text-white">Các học phần đã đăng ký</h2>

    <table class="table table-striped table-hover bg-white rounded-3 overflow-hidden"
           th:if="${enrollments != null and #lists.size(enrollments) > 0}">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Course</th>
            <th>Credits</th>
            <th>Lecturer</th>
            <th>Enroll Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e, stat : ${enrollments}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${e.course.name}">Course Name</td>
            <td th:text="${e.course.credits}">3</td>
            <td th:text="${e.course.lecturer}">Lecturer</td>
            <td th:text="${#temporals.format(e.enrollDate, 'dd/MM/yyyy HH:mm')}">date</td>
        </tr>
        </tbody>
    </table>

    <div class="card shadow-sm" th:if="${enrollments == null or #lists.size(enrollments) == 0}">
        <div class="card-body">
            <p class="text-muted mb-0">Bạn chưa đăng ký học phần nào.</p>
        </div>
    </div>
</div>

<footer class="text-center mt-auto mb-3 text-light-50">
    <hr class="border-light">
    <p class="text-light">&copy; 2025 - Course Registration Application</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
