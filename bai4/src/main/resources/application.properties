spring.application.name=bai4
# Chạy port 8081 để tránh trùng với Apache/PHP đang dùng 8080
server.port=8081

# ================== MySQL datasource ==================
# Đổi username/password cho phù hợp với MySQL của bạn
spring.datasource.url=jdbc:mysql://localhost:3306/product_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================== JPA / Hibernate ==================
# Vì bạn đã tự tạo bảng trong MySQL, để none để tránh tự sửa cấu trúc
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ================== Upload file cấu hình sẵn ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
