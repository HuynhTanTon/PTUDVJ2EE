<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Dang nhap he thong</h3>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Sai ten dang nhap hoac mat khau.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        Ban da dang xuat.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" name="username" type="text" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-primary w-100">Dang nhap</button>
                    </form>

                    <p class="text-muted mt-3 mb-0 text-center">
                        Tai khoan demo: admin/123456, user/123456
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
