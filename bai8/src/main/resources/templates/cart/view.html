<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng · Bai8 Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-app d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: shop-navbar('cart')}"></div>

<main class="bai8-main container py-4 py-md-5">
    <header class="mb-4 d-flex flex-wrap align-items-end justify-content-between gap-3">
        <div>
            <h1 class="bai8-page-title display-6 mb-1">Giỏ hàng</h1>
            <p class="bai8-page-sub mb-0">Kiểm tra sản phẩm trước khi đặt hàng.</p>
        </div>
        <a class="btn btn-outline-primary rounded-3" th:href="@{/products}">
            <i class="bi bi-arrow-left me-1"></i>Tiếp tục mua
        </a>
    </header>

    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm" th:text="${error}"></div>

    <div th:if="${cartEmpty}" class="bai8-filter-card bai8-empty">
        <i class="bi bi-bag-x d-block mb-3"></i>
        <p class="fw-medium mb-2">Giỏ hàng đang trống.</p>
        <a class="btn btn-primary rounded-3" th:href="@{/products}">Khám phá sản phẩm</a>
    </div>

    <div th:unless="${cartEmpty}" class="bai8-table-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Sản phẩm</th>
                    <th class="text-end">Đơn giá</th>
                    <th class="text-center" style="width: 120px">Số lượng</th>
                    <th class="text-end pe-4">Thành tiền</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line : ${lines}">
                    <td class="ps-4 fw-medium" th:text="${line.name}">Name</td>
                    <td class="text-end text-muted" th:text="${#numbers.formatInteger(line.price, 0, 'COMMA')} + ' đ'">0</td>
                    <td class="text-center">
                        <span class="badge text-bg-light text-dark px-3 py-2 rounded-pill" th:text="${line.quantity}">1</span>
                    </td>
                    <td class="text-end pe-4 fw-semibold text-primary"
                        th:text="${#numbers.formatInteger(line.lineTotal, 0, 'COMMA')} + ' đ'">0</td>
                </tr>
                </tbody>
                <tfoot class="border-top">
                <tr class="fw-bold">
                    <td colspan="3" class="text-end ps-4 py-4">Tổng thanh toán</td>
                    <td class="text-end pe-4 py-4 fs-5 text-primary"
                        th:text="${#numbers.formatInteger(grandTotal, 0, 'COMMA')} + ' đ'">0</td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="d-flex flex-wrap gap-3 mt-4" th:unless="${cartEmpty}">
        <form th:action="@{/checkout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-lg btn-primary rounded-3 px-4 fw-semibold shadow-sm">
                <i class="bi bi-bag-check me-2"></i>Đặt hàng (Checkout)
            </button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: shop-footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
