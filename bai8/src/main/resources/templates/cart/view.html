<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Bai8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/products}">Bai8 Shop</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/cart}">Giỏ hàng</a>
    </div>
</nav>

<div class="container pb-5">
    <h1 class="h3 mb-3">Giỏ hàng (Câu 6)</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Câu 6: tên, giá, số lượng, thành tiền, tổng tiền -->
    <div th:if="${cartEmpty}" class="alert alert-info">Giỏ hàng đang trống.</div>

    <div th:unless="${cartEmpty}" class="table-responsive shadow-sm bg-white rounded">
        <table class="table mb-0">
            <thead class="table-dark">
            <tr>
                <th>Tên sản phẩm</th>
                <th class="text-end">Giá</th>
                <th class="text-center">Số lượng</th>
                <th class="text-end">Thành tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="line : ${lines}">
                <td th:text="${line.name}">Name</td>
                <td class="text-end" th:text="${#numbers.formatInteger(line.price, 0, 'COMMA')} + ' đ'">0</td>
                <td class="text-center" th:text="${line.quantity}">1</td>
                <td class="text-end" th:text="${#numbers.formatInteger(line.lineTotal, 0, 'COMMA')} + ' đ'">0</td>
            </tr>
            </tbody>
            <tfoot>
            <tr class="fw-bold table-light">
                <td colspan="3" class="text-end">Tổng cộng</td>
                <td class="text-end" th:text="${#numbers.formatInteger(grandTotal, 0, 'COMMA')} + ' đ'">0</td>
            </tr>
            </tfoot>
        </table>
    </div>

    <!-- Câu 7: checkout → lưu DB + xóa session -->
    <form th:unless="${cartEmpty}" class="mt-3" th:action="@{/checkout}" method="post">
        <button type="submit" class="btn btn-primary">Đặt hàng (Checkout)</button>
        <a class="btn btn-outline-secondary" th:href="@{/products}">Tiếp tục mua</a>
    </form>
</div>
</body>
</html>
