<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công · Bai8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-app d-flex flex-column min-vh-100">
<div class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container text-center">
        <div class="bai8-filter-card p-5 mx-auto" style="max-width: 440px;">
            <div class="bai8-success-icon mx-auto mb-4">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1 class="h3 bai8-page-title mb-2">Đặt hàng thành công</h1>
            <p class="text-muted mb-1" th:if="${orderId != null}">
                Mã đơn: <strong class="text-dark fs-5" th:text="${orderId}">#</strong>
            </p>
            <p class="text-muted small mb-4">Đơn và chi tiết đã lưu vào cơ sở dữ liệu. Giỏ hàng session đã được làm trống.</p>
            <a class="btn btn-primary btn-lg rounded-3 px-4 fw-semibold" th:href="@{/products}">
                <i class="bi bi-shop me-2"></i>Về cửa hàng
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: shop-footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
