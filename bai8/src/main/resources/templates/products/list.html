<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm · Bai8 Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-app d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: shop-navbar('products')}"></div>

<main class="bai8-main container py-4 py-md-5">
    <header class="mb-4">
        <h1 class="bai8-page-title display-6">Sản phẩm</h1>
        <p class="bai8-page-sub mb-0">Tìm kiếm, lọc danh mục, sắp xếp giá — thêm vào giỏ khi đã đăng nhập.</p>
    </header>

    <div th:if="${param.logout}" class="alert alert-info border-0 shadow-sm d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-info-circle flex-shrink-0"></i><span>Bạn đã đăng xuất.</span>
    </div>
    <div th:if="${message}" class="alert alert-success border-0 shadow-sm d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle flex-shrink-0"></i><span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm" th:text="${error}"></div>

    <form class="bai8-filter-card p-4 mb-4" th:action="@{/products}" method="get">
        <input type="hidden" name="page" value="0">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label"><i class="bi bi-search me-1"></i>Từ khóa tên</label>
                <input class="form-control form-control-lg shadow-none" name="keyword" th:value="${keyword}"
                       placeholder="VD: iPhone, Dell, Tai nghe…">
            </div>
            <div class="col-md-3">
                <label class="form-label"><i class="bi bi-folder me-1"></i>Danh mục</label>
                <select class="form-select form-select-lg shadow-none" name="categoryId">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="c : ${categories}" th:value="${c.id}"
                            th:selected="${categoryId != null && categoryId == c.id}"
                            th:text="${c.name}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label"><i class="bi bi-sort-down me-1"></i>Sắp xếp giá</label>
                <select class="form-select form-select-lg shadow-none" name="sort">
                    <option value="asc" th:selected="${sort == 'asc'}">Tăng dần (ASC)</option>
                    <option value="desc" th:selected="${sort == 'desc'}">Giảm dần (DESC)</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-semibold">
                    <i class="bi bi-funnel me-1"></i>Áp dụng
                </button>
            </div>
        </div>
    </form>

    <!-- Lưới thẻ sản phẩm -->
    <div th:if="${productPage.isEmpty()}" class="bai8-filter-card bai8-empty">
        <i class="bi bi-inbox d-block mb-3"></i>
        <p class="mb-0 fw-medium">Không có sản phẩm phù hợp. Thử đổi từ khóa hoặc danh mục.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4" th:if="${!productPage.isEmpty()}">
        <div class="col" th:each="p : ${productPage.content}">
            <article class="card h-100 bai8-product-card border-0 shadow-sm">
                <div class="card-img-wrap ratio ratio-4x3 overflow-hidden">
                    <img th:if="${p.image != null}" th:src="${p.image}" class="card-img-top" alt="" loading="lazy">
                    <div th:unless="${p.image != null}" class="d-flex align-items-center justify-content-center h-100 text-muted">
                        <i class="bi bi-image fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="card-body d-flex flex-column">
                    <span class="badge rounded-pill text-bg-light text-secondary-emphasis align-self-start mb-2"
                          th:text="${p.category != null ? p.category.name : 'Khác'}">Cat</span>
                    <h2 class="h5 card-title flex-grow-0" th:text="${p.name}">Name</h2>
                    <p class="bai8-price mb-3" th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + ' đ'">0</p>
                    <div class="mt-auto d-grid gap-2">
                        <form sec:authorize="hasAnyRole('USER','ADMIN')" th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                            <button type="submit" class="btn btn-bai8-cart text-white w-100">
                                <i class="bi bi-cart-plus me-1"></i>Thêm vào giỏ
                            </button>
                        </form>
                        <a sec:authorize="!isAuthenticated()" class="btn btn-outline-secondary rounded-3"
                           th:href="@{/login}">
                            <i class="bi bi-person me-1"></i>Đăng nhập để mua
                        </a>
                    </div>
                </div>
            </article>
        </div>
    </div>

    <nav class="mt-5 d-flex justify-content-center" th:if="${productPage.totalPages > 1}">
        <ul class="pagination bai8-pagination flex-wrap justify-content-center mb-0">
            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link border-0"
                   th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}">
                    <i class="bi bi-chevron-left"></i> Trước
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link border-0" th:text="${i + 1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}"></a>
            </li>
            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link border-0"
                   th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}">
                    Sau <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/footer :: shop-footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
