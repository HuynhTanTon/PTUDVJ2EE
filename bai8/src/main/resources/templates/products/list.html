<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - Bai8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/products}">Bai8 Shop</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/cart}">Giỏ hàng</a>
    </div>
</nav>

<div class="container pb-5">
    <h1 class="h3 mb-3">Sản phẩm</h1>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Câu 1 + 3 + 4: form tìm theo tên, sort giá, lọc category (GET → backend LIKE + filter) -->
    <form class="card card-body shadow-sm mb-4" th:action="@{/products}" method="get">
        <input type="hidden" name="page" value="0">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Từ khóa tên (Câu 1)</label>
                <input class="form-control" name="keyword" th:value="${keyword}" placeholder="VD: iPhone, Dell...">
            </div>
            <div class="col-md-3">
                <label class="form-label">Danh mục (Câu 4)</label>
                <select class="form-select" name="categoryId">
                    <option value="">— Tất cả —</option>
                    <option th:each="c : ${categories}" th:value="${c.id}"
                            th:selected="${categoryId != null && categoryId == c.id}"
                            th:text="${c.name}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Sắp xếp giá (Câu 3)</label>
                <select class="form-select" name="sort">
                    <option value="asc" th:selected="${sort == 'asc'}">Tăng dần (ASC)</option>
                    <option value="desc" th:selected="${sort == 'desc'}">Giảm dần (DESC)</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Áp dụng</button>
            </div>
        </div>
    </form>

    <div class="table-responsive shadow-sm bg-white rounded">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th>Ảnh</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productPage.content}">
                <td style="width:100px">
                    <img th:if="${p.image != null}" th:src="${p.image}" alt="" class="img-thumbnail" style="max-height:60px">
                </td>
                <td th:text="${p.name}">Name</td>
                <td th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + ' đ'">0</td>
                <td th:text="${p.category != null ? p.category.name : ''}">Cat</td>
                <td>
                    <!-- Câu 5: Add to Cart → session -->
                    <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-success">Add to Cart</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${productPage.isEmpty()}">
                <td colspan="5" class="text-center text-muted">Không có sản phẩm phù hợp.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Câu 2: phân trang 5/trang — Previous / Next + số trang -->
    <nav class="mt-3" th:if="${productPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}">Previous</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}"></a>
            </li>
            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, sort=${sort}, categoryId=${categoryId})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
