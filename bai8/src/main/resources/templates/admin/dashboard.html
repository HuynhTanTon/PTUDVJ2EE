<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị · Bai8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-app d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: admin-navbar}"></div>

<main class="bai8-main container py-5">
    <header class="mb-4">
        <h1 class="bai8-page-title display-6">Bảng điều khiển</h1>
        <p class="bai8-page-sub">Xin chào, <strong sec:authentication="name">admin</strong>. Bạn đang dùng quyền <span class="badge text-bg-danger">ADMIN</span></p>
    </header>

    <div class="alert alert-success border-0 shadow-sm d-flex gap-3 align-items-start">
        <i class="bi bi-shield-check fs-4 text-success flex-shrink-0"></i>
        <div>
            <strong>Truy cập hợp lệ.</strong> Chỉ tài khoản có ROLE_ADMIN mới vào được trang này.
            <p class="small text-muted mb-0 mt-2">Có thể mở rộng CRUD sản phẩm, quản lý đơn hàng tại đây.</p>
        </div>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-md-4">
            <div class="card bai8-stat-card h-100 position-relative">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-3 bg-primary bg-opacity-10 p-3 text-primary"><i class="bi bi-box-seam fs-3"></i></div>
                        <div>
                            <div class="text-muted small text-uppercase fw-semibold">Sản phẩm</div>
                            <div class="h5 mb-0">Catalog</div>
                        </div>
                    </div>
                    <a class="stretched-link" th:href="@{/products}" aria-label="Mở cửa hàng"></a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bai8-stat-card h-100 position-relative">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-3 bg-warning bg-opacity-10 p-3 text-warning"><i class="bi bi-bag fs-3"></i></div>
                        <div>
                            <div class="text-muted small text-uppercase fw-semibold">Giỏ & đơn</div>
                            <div class="h5 mb-0">Mua hàng</div>
                        </div>
                    </div>
                    <a class="stretched-link" th:href="@{/cart}" aria-label="Giỏ hàng"></a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bai8-stat-card h-100 border-secondary border-opacity-25">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-3 bg-secondary bg-opacity-10 p-3 text-secondary"><i class="bi bi-gear fs-3"></i></div>
                        <div>
                            <div class="text-muted small text-uppercase fw-semibold">Mở rộng</div>
                            <div class="h5 mb-0">CRUD</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: shop-footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
