<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký · Bai8 Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-auth-bg">
<div class="bai8-auth-card p-4 p-md-5">
    <div class="text-center mb-4">
        <h1 class="h3 bai8-auth-brand mb-1">Tạo tài khoản</h1>
        <p class="text-muted small mb-0">Bạn sẽ có quyền <strong>USER</strong> — mua hàng và thanh toán.</p>
    </div>

    <form th:action="@{/register}" th:object="${form}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-secondary">Username</label>
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-plus text-muted"></i></span>
                <input class="form-control border-start-0 ps-0 shadow-none" th:field="*{username}" placeholder="Tối thiểu 3 ký tự">
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small text-secondary">Mật khẩu</label>
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-lock text-muted"></i></span>
                <input class="form-control border-start-0 ps-0 shadow-none" type="password" th:field="*{password}" placeholder="Tối thiểu 4 ký tự">
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100 rounded-3 fw-semibold shadow">
            <i class="bi bi-person-check me-2"></i>Đăng ký
        </button>
    </form>

    <div class="text-center mt-4 pt-3 border-top border-light-subtle">
        <a class="text-decoration-none" th:href="@{/login}">Đã có tài khoản? <span class="text-primary fw-medium">Đăng nhập</span></a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
