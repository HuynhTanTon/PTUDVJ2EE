<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập · Bai8 Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-auth-bg">
<div class="bai8-auth-card p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="bai8-logo-dot mx-auto mb-3" style="width:12px;height:12px"></div>
        <h1 class="h3 bai8-auth-brand mb-1">Bai8 Shop</h1>
        <p class="text-muted small mb-0">Đăng nhập để thêm sản phẩm vào giỏ</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger border-0 small d-flex align-items-start gap-2">
        <i class="bi bi-exclamation-triangle flex-shrink-0 mt-1"></i>
        <span>Sai username hoặc mật khẩu.</span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success border-0 small d-flex align-items-start gap-2">
        <i class="bi bi-check-circle flex-shrink-0 mt-1"></i>
        <span>Đăng ký thành công, vui lòng đăng nhập.</span>
    </div>
    <div th:if="${param.logout}" class="alert alert-info border-0 small">Bạn đã đăng xuất.</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-secondary">Username</label>
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input class="form-control border-start-0 ps-0 shadow-none" name="username" required autofocus placeholder="Nhập username">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small text-secondary">Mật khẩu</label>
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                <input class="form-control border-start-0 ps-0 shadow-none" type="password" name="password" required placeholder="••••••••">
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-semibold shadow">
            Đăng nhập
        </button>
    </form>

    <div class="rounded-3 bg-light p-3 mt-4 small text-muted">
        <i class="bi bi-info-circle me-1"></i>
        Demo: <strong>user</strong> / <strong>123456</strong> hoặc <strong>admin</strong> / <strong>123456</strong>
    </div>

    <div class="text-center mt-4 pt-3 border-top border-light-subtle">
        <a class="text-decoration-none fw-medium" th:href="@{/register}">Chưa có tài khoản? <span class="text-primary">Đăng ký</span></a>
        <br>
        <a class="text-muted small mt-2 d-inline-block" th:href="@{/products}"><i class="bi bi-arrow-left me-1"></i>Về cửa hàng</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
