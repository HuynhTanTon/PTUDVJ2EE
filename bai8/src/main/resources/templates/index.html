<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai8 Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/bai8-theme.css}" rel="stylesheet">
</head>
<body class="bai8-app d-flex flex-column min-vh-100">
<main class="bai8-main flex-grow-1 d-flex align-items-center">
    <div class="container py-5">
        <div class="row align-items-center g-5">
            <div class="col-lg-6 text-center text-lg-start">
                <p class="text-uppercase small fw-semibold text-primary mb-2 bai8-track">Spring Boot · JPA · Security</p>
                <h1 class="display-4 fw-bold bai8-page-title lh-sm mb-3">
                    Cửa hàng <span class="text-primary">Bai8</span>
                </h1>
                <p class="lead text-muted mb-4">
                    Sản phẩm, giỏ hàng session, đặt hàng có lưu <strong>Order</strong> &amp; <strong>OrderDetail</strong>.
                    Đăng nhập để mua — phân quyền USER / ADMIN.
                </p>
                <div class="d-flex flex-wrap gap-3 justify-content-center justify-content-lg-start">
                    <a class="btn btn-primary btn-lg rounded-3 px-4 fw-semibold shadow" th:href="@{/products}">
                        <i class="bi bi-arrow-right-circle me-2"></i>Vào cửa hàng
                    </a>
                    <a class="btn btn-outline-secondary btn-lg rounded-3 px-4" th:href="@{/login}">
                        Đăng nhập
                    </a>
                </div>
                <p class="small text-muted mt-4 mb-0">
                    <i class="bi bi-lightning-charge text-warning me-1"></i>
                    Chạy <code class="user-select-all">.\mvnw spring-boot:run</code> — cổng <strong>8084</strong>
                </p>
            </div>
            <div class="col-lg-6">
                <div class="bai8-filter-card p-4 p-md-5 text-center">
                    <div class="row g-4 text-start">
                        <div class="col-6">
                            <div class="rounded-3 bg-primary bg-opacity-10 p-4 text-center">
                                <i class="bi bi-search fs-2 text-primary"></i>
                                <div class="small fw-semibold mt-2">Tìm &amp; lọc</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="rounded-3 bg-success bg-opacity-10 p-4 text-center">
                                <i class="bi bi-cart3 fs-2 text-success"></i>
                                <div class="small fw-semibold mt-2">Giỏ hàng</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="rounded-3 bg-warning bg-opacity-10 p-4 text-center">
                                <i class="bi bi-receipt fs-2 text-warning"></i>
                                <div class="small fw-semibold mt-2">Checkout</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="rounded-3 bg-danger bg-opacity-10 p-4 text-center">
                                <i class="bi bi-shield-lock fs-2 text-danger"></i>
                                <div class="small fw-semibold mt-2">Security</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: shop-footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
