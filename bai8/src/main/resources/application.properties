spring.application.name=bai8
server.port=8084

# Tài khoản mẫu (seed lần đầu): user/123456 (USER), admin/123456 (USER+ADMIN)
# Đăng ký mới → role USER. Giỏ hàng/checkout: USER hoặc ADMIN. Trang /admin: chỉ ADMIN.

# MySQL — chỉnh user/password cho máy bạn (XAMPP thường password trống)
spring.datasource.url=jdbc:mysql://localhost:3306/bai8_shop?createDatabaseIfNotExist=true&useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Seed SQL (tùy chọn — bật khi cần nạp dữ liệu mẫu lần đầu)
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql
